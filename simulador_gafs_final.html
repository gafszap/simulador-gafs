<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador GAFS - Letras Caixa</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    h1 { color: #f4d03f; }
    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 16px;
      width: 180px;
      cursor: pointer;
    }
    .card img { width: 100%; height: auto; margin-bottom: 10px; }
    .card.selected { border-color: #f4d03f; box-shadow: 0 0 8px #f4d03f; }
    .button {
      background: #00c98d;
      color: white;
      border: none;
      padding: 10px 30px;
      font-size: 16px;
      margin-top: 20px;
      border-radius: 4px;
      cursor: pointer;
    }
    .input-group { margin-top: 20px; }
    label { display: inline-block; margin: 5px; }
    #extras label { display: none; }
    table.resumo { margin: 20px auto; border-collapse: collapse; }
    table.resumo th, table.resumo td { border: 1px solid #444; padding: 4px 8px; }
    .disclaimer { font-size: 12px; margin-top: 10px; color: #ccc; }
  </style>
</head>
<body>
  <h1>Simulador de Letras Caixa - GAFS</h1>
  <h2>1️⃣ Escolha o tipo de letra</h2>
  <div class="card-container" id="letraTipo">
    <div class="card" onclick="selecionarLetra(this, 'Inox Polido')">
      <img src="https://via.placeholder.com/180x100?text=Inox+Polido" alt="Inox Polido"/>
      <strong>Inox Polido</strong><br/><small>Permite LED Indireto</small>
    </div>
    <div class="card" onclick="selecionarLetra(this, 'Galvanizado')">
      <img src="https://via.placeholder.com/180x100?text=Galvanizado" alt="Galvanizado"/>
      <strong>Galvanizado</strong><br/><small>Permite LED Indireto</small>
    </div>
    <div class="card" onclick="selecionarLetra(this, 'Galvanizado com Filete')">
      <img src="https://via.placeholder.com/180x100?text=Com+Filete" alt="Galvanizado com Filete"/>
      <strong>Com Filete</strong><br/><small>LED Interno (Acrílico)</small>
    </div>
    <div class="card" onclick="selecionarLetra(this, 'PVC Expandido')">
      <img src="https://via.placeholder.com/180x100?text=PVC+Expandido" alt="PVC Expandido"/>
      <strong>PVC Expandido</strong><br/><small>Sem Iluminação</small>
    </div>
  </div>

  <div class="input-group">
    <label>Altura da letra (cm): <input type="number" id="altura" min="1"/></label>
    <label>Quantidade de letras: <input type="number" id="quantidade" min="1" value="1"/></label>
  </div>

  <h2>2️⃣ Opcionais</h2>
  <div id="extras" class="input-group">
    <label for="pintura"><input type="checkbox" id="pintura" data-nome="Pintura"/> Pintura</label>
    <label for="led_indireto"><input type="checkbox" id="led_indireto" data-nome="LED Indireto"/> LED Indireto</label>
    <label for="led_interno"><input type="checkbox" id="led_interno" data-nome="LED Interno"/> LED Interno</label>
    <label for="acrilico"><input type="checkbox" id="acrilico" data-nome="Acrílico"/> Acrílico</label>
  </div>

  <button class="button" onclick="calcularPreco()">Calcular Preço</button>

  <div id="resultado"></div>

  <script src="simulador.js"></script>
</body>
</html>
