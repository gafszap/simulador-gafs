
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador GAFS - Letras Caixa</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #f4d03f;
    }
    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 16px;
      width: 180px;
      cursor: pointer;
    }
    .card img {
      width: 100%;
      height: auto;
      margin-bottom: 10px;
    }
    .card.selected {
      border-color: #f4d03f;
      box-shadow: 0 0 8px #f4d03f;
    }
    .button {
      background: #00c98d;
      color: white;
      border: none;
      padding: 10px 30px;
      font-size: 16px;
      margin-top: 20px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Simulador de Letras Caixa - GAFS</h1>
  <h2>1️⃣ Escolha o tipo de letra</h2>
  <div class="card-container" id="letraTipo">
    <div class="card" onclick="selecionarLetra(this, 'Inox Polido')">
      <img src="https://via.placeholder.com/180x100?text=Inox+Polido" alt="Inox Polido"/>
      <strong>Inox Polido</strong><br/><small>Permite LED Indireto</small>
    </div>
    <div class="card" onclick="selecionarLetra(this, 'Galvanizado')">
      <img src="https://via.placeholder.com/180x100?text=Galvanizado" alt="Galvanizado"/>
      <strong>Galvanizado</strong><br/><small>Permite LED Indireto</small>
    </div>
    <div class="card" onclick="selecionarLetra(this, 'Galvanizado com Filete')">
      <img src="https://via.placeholder.com/180x100?text=Com+Filete" alt="Galvanizado com Filete"/>
      <strong>Com Filete</strong><br/><small>LED Interno (Acrílico)</small>
    </div>
    <div class="card" onclick="selecionarLetra(this, 'PVC Expandido')">
      <img src="https://via.placeholder.com/180x100?text=PVC+Expandido" alt="PVC Expandido"/>
      <strong>PVC Expandido</strong><br/><small>Sem Iluminação</small>
    </div>
  </div>

  <h2>2️⃣ Escolha a faixa de tamanho</h2>
  <div id="tamanhoRange">
    <label><input type="radio" name="tamanho" value="Pequeno" onclick="selecionarTamanho('Pequeno')"/> Até 20cm</label><br/>
    <label><input type="radio" name="tamanho" value="Médio" onclick="selecionarTamanho('Médio')"/> 21cm - 50cm</label><br/>
    <label><input type="radio" name="tamanho" value="Grande" onclick="selecionarTamanho('Grande')"/> Acima de 50cm</label>
  </div>

  <h2>3️⃣ Extras</h2>
  <div id="extras">
    <label><input type="checkbox" value="Iluminação LED" onclick="toggleExtra(this)"/> Iluminação LED</label><br/>
    <label><input type="checkbox" value="Pintura Especial" onclick="toggleExtra(this)"/> Pintura Especial</label>
  </div>

  <h2>Total estimado: <span id="total">R$ 0,00</span></h2>

  <button class="button" onclick="irParaWhatsApp()">Avançar</button>

  <script>
    let letraSelecionada = '';
    let tamanhoSelecionado = '';
    let extrasSelecionados = [];

    const precosLetra = {
      'Inox Polido': 100,
      'Galvanizado': 80,
      'Galvanizado com Filete': 120,
      'PVC Expandido': 50
    };

    const precosTamanho = {
      'Pequeno': 1,
      'Médio': 1.5,
      'Grande': 2
    };

    const precosExtras = {
      'Iluminação LED': 40,
      'Pintura Especial': 30
    };

    function selecionarLetra(card, tipo) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      letraSelecionada = tipo;
      calcularTotal();
    }

    function selecionarTamanho(tamanho) {
      tamanhoSelecionado = tamanho;
      calcularTotal();
    }

    function toggleExtra(checkbox) {
      if (checkbox.checked) {
        extrasSelecionados.push(checkbox.value);
      } else {
        extrasSelecionados = extrasSelecionados.filter(e => e !== checkbox.value);
      }
      calcularTotal();
    }

    function calcularTotal() {
      if (!letraSelecionada || !tamanhoSelecionado) {
        document.getElementById('total').innerText = 'R$ 0,00';
        return 0;
      }
      let total = precosLetra[letraSelecionada] * precosTamanho[tamanhoSelecionado];
      extrasSelecionados.forEach(extra => total += precosExtras[extra]);
      document.getElementById('total').innerText = `R$ ${total.toFixed(2)}`;
      return total;
    }

    function irParaWhatsApp() {
      if (!letraSelecionada) {
        alert('Selecione o tipo de letra antes de continuar.');
        return;
      }
      if (!tamanhoSelecionado) {
        alert('Selecione a faixa de tamanho antes de continuar.');
        return;
      }
      const total = calcularTotal();
      const extras = extrasSelecionados.length ? extrasSelecionados.join(', ') : 'Nenhum';
      const mensagem = encodeURIComponent(`Olá! Gostaria de um orçamento para:\n\nTipo: ${letraSelecionada}\nTamanho: ${tamanhoSelecionado}\nExtras: ${extras}\nTotal estimado: R$ ${total.toFixed(2)}\n\nAguardarei o retorno.`);
      window.open(`https://wa.me/553433363486?text=${mensagem}`, '_blank');
    }
  </script>
</body>
</html>
